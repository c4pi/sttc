name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras --dev --python 3.12

      - name: Build executable
        run: uv run pyinstaller --clean sttc.spec

      - name: Package Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/sttc-windows-x64 | Out-Null
          Copy-Item dist/sttc.exe release/sttc-windows-x64/sttc.exe
          Copy-Item dist/_internal release/sttc-windows-x64/_internal -Recurse
          Compress-Archive -Path release/sttc-windows-x64 -DestinationPath release/sttc-windows-x64.zip -Force

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: release/sttc-windows-x64.zip

