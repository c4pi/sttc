  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-windows
      # - build-macos
      # - build-linux
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          cp release-artifacts/windows-binary/sttc-windows-x64.zip sttc-windows-x64.zip
          # cp release-artifacts/linux-binary/sttc sttc-linux-x64
          # chmod +x sttc-linux-x64
          # tar -czf sttc-linux-x64.tar.gz sttc-linux-x64
          # cp release-artifacts/macos-binary/sttc-macos-x64.tar.gz sttc-macos-x64.tar.gz
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # macOS and Linux release assets are intentionally disabled for now.
          files: |
            sttc-windows-x64.zip
